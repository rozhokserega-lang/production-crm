name: Test branch CI

on:
  push:
    branches:
      - test
    paths:
      - "fronted/**"
      - ".github/workflows/test-branch-ci.yml"
  pull_request:
    branches:
      - test
    paths:
      - "fronted/**"
      - ".github/workflows/test-branch-ci.yml"
  workflow_dispatch:

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fronted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: fronted/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build project
        run: npm run build

      - name: Run Supabase RPC smoke
        if: ${{ secrets.STAGING_SUPABASE_URL != '' && secrets.STAGING_SUPABASE_ANON_KEY != '' }}
        run: npm run smoke:rpc
        env:
          SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}

      - name: Warn if smoke skipped
        if: ${{ secrets.STAGING_SUPABASE_URL == '' || secrets.STAGING_SUPABASE_ANON_KEY == '' }}
        run: echo "Supabase smoke skipped: set STAGING_SUPABASE_URL and STAGING_SUPABASE_ANON_KEY secrets."

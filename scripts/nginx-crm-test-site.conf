# Пример vhost для staging CRM (Vite SPA).
# Скопируйте в /etc/nginx/sites-available/crm-test и поправьте server_name / root при необходимости.
#
# Критично: location ^~ /assets/ — иначе несуществующий /assets/*.js получит index.html с 200 OK
# и браузер покажет белый экран.

server {
    listen 80;
    server_name 164.215.97.254;

    root /var/www/crm-test;
    index index.html;

    location ^~ /assets/ {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
